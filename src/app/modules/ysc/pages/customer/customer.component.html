<app-crud-page 
    title="Müşteri"
    dialogWidth="820px"
    [data]="list"
    [columns]="cols"
    [loading]="loading"
    [isEdit]="isEdit"
    [globalFilterFields]="['name','taxOffice','firmOfficial']"
    [formInvalid]="form.invalid"
    [(showDialog)]="showDialog"
    (onNew)="openNew()"
    (onEdit)="openEdit($event)"
    (onDelete)="confirmDelete($event)"
    (onDetail)="goToDetail($event)"
    (onSubmit)="onSubmit()"
    (onHideDialog)="form.reset()"
    [formTemplate]="formBody">
    
    <ng-template #formBody>
        <form [formGroup]="form">

            <!-- Firma Bilgileri -->
            <div class="section-title">Firma Bilgileri</div>
            <div class="form-grid">
                <div class="field">
                    <label>Firma Adı <span class="req">*</span></label>
                    <input pInputText formControlName="name" class="w-full"
                        [class.ng-invalid]="f['name'].invalid && f['name'].touched" />
                    @if(f['name'].invalid && f['name'].touched) {
                    <small class="err">Zorunlu alan.</small>
                    }
                </div>
                <div class="field">
                    <label>Resmi Firma Adı</label>
                    <input pInputText formControlName="officialFirmName" class="w-full" />
                </div>
                <div class="field">
                    <label>Vergi No <span class="req">*</span></label>
                    <p-inputnumber formControlName="taxNumber" [useGrouping]="false" styleClass="w-full"
                        [invalid]="!!(f['taxNumber'].invalid && f['taxNumber'].touched)" />
                    @if(f['taxNumber'].invalid && f['taxNumber'].touched) {
                    <small class="err">Zorunlu alan.</small>
                    }
                </div>
                <div class="field">
                    <label>Vergi Dairesi</label>
                    <input pInputText formControlName="taxOffice" class="w-full" />
                </div>
                <div class="field">
                    <label>Firma Yetkilisi</label>
                    <input pInputText formControlName="firmOfficial" class="w-full" />
                </div>
                <div class="field">
                    <label>Firma No</label>
                    <input pInputText formControlName="firmNo" class="w-full" />
                </div>
                <div class="field">
                    <label>Faks</label>
                    <input pInputText formControlName="faxNumber" class="w-full" />
                </div>
                <div class="field">
                    <label>CE Sertifika No</label>
                    <input pInputText formControlName="ceCertificateNo" class="w-full" />
                </div>
                <div class="field">
                    <label>TS No</label>
                    <input pInputText formControlName="tsNo" class="w-full" />
                </div>
                <div class="field">
                    <label>TSE No</label>
                    <input pInputText formControlName="tseNo" class="w-full" />
                </div>
                <div class="field">
                    <label>HYB No</label>
                    <input pInputText formControlName="hybNo" class="w-full" />
                </div>
                <div class="field">
                    <label>DYB No</label>
                    <input pInputText formControlName="dybNo" class="w-full" />
                </div>
                <div class="field">
                    <label>TSE Sertifika Bitiş</label>
                    <p-datepicker formControlName="tseCertificateExpireDate" dateFormat="dd.mm.yy" styleClass="w-full"
                        [showIcon]="true" />
                </div>
                <div class="field">
                    <label>HYB Sertifika Bitiş</label>
                    <p-datepicker formControlName="hybCertificateExpireDate" dateFormat="dd.mm.yy" styleClass="w-full"
                        [showIcon]="true" />
                </div>
            </div>

            <!-- Adres -->
            <div class="section-title" style="margin-top:1.25rem;">Adres Bilgileri</div>
            <div class="form-grid" [formGroup]="addrForm">
                <div class="field">
                    <label>Adres Etiketi</label>
                    <input pInputText formControlName="label" class="w-full" placeholder="ör. Merkez" />
                </div>
                <div class="field">
                    <label>İl</label>
                    <p-select formControlName="provinceId" [options]="provinces" optionLabel="name" optionValue="id"
                        placeholder="İl seçin" styleClass="w-full" [filter]="true"
                        (onChange)="onProvinceChange($event.value, undefined)" />
                </div>
                <div class="field">
                    <label>İlçe</label>
                    <p-select formControlName="districtId" [options]="districts" optionLabel="name" optionValue="id"
                        placeholder="İlçe seçin" styleClass="w-full" [filter]="true"
                        (onChange)="onDistrictChange($event.value)" />
                </div>
                <div class="field">
                    <label>Mahalle</label>
                    <p-select formControlName="neighbourhoodId" [options]="neighbourhoods" optionLabel="name"
                        optionValue="id" placeholder="Mahalle seçin" styleClass="w-full" [filter]="true" />
                </div>
                <div class="field">
                    <label>Posta Kodu</label>
                    <p-inputnumber formControlName="postalCode" [useGrouping]="false" styleClass="w-full" />
                </div>
                <div class="field">
                    <label>Sokak / Cadde</label>
                    <input pInputText formControlName="street" class="w-full" />
                </div>
                <div class="field">
                    <label>Bina No</label>
                    <input pInputText formControlName="buildingNo" class="w-full" />
                </div>
                <div class="field">
                    <label>Kapı No</label>
                    <input pInputText formControlName="doorNo" class="w-full" />
                </div>
                <div class="field" style="grid-column:span 2;">
                    <label>Tam Adres</label>
                    <textarea pTextarea formControlName="fullAddress" rows="2" class="w-full"></textarea>
                </div>
            </div>

            <!-- İletişim -->
            <div class="section-title" style="margin-top:1.25rem;">İletişim Kişisi</div>
            <div class="form-grid" [formGroup]="contactForm">
                <div class="field">
                    <label>Ad</label>
                    <input pInputText formControlName="name" class="w-full" />
                </div>
                <div class="field">
                    <label>Soyad</label>
                    <input pInputText formControlName="surname" class="w-full" />
                </div>
                <div class="field">
                    <label>Görevi / Rolü</label>
                    <input pInputText formControlName="role" class="w-full" />
                </div>
                <div class="field">
                    <label>Telefon</label>
                    <input pInputText formControlName="phone" class="w-full" />
                </div>
                <div class="field">
                    <label>E-posta</label>
                    <input pInputText formControlName="email" class="w-full" type="email" />
                </div>
                <div class="field">
                    <label>Notlar</label>
                    <textarea pTextarea formControlName="notes" rows="2" class="w-full"></textarea>
                </div>
            </div>

        </form>
    </ng-template>
</app-crud-page>
